global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: user-service
    metrics_path: /api/v1/actuator/prometheus
    static_configs:
      - targets: ['ms-user-service:8080']

  - job_name: catalog-service
    metrics_path: /api/v1/actuator/prometheus
    static_configs:
      - targets: ['ms-catalog-service:8080']

  - job_name: booking-service
    metrics_path: /api/v1/actuator/prometheus
    static_configs:
      - targets: ['ms-booking-service:8080']

  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ms-gateway:8080']

  - job_name: discovery-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['ms-discovery-server:8761']

  - job_name: loki
    static_configs:
      - targets: ['ms-loki:3100']

  - job_name: promtail
    static_configs:
      - targets: ['ms-promtail:9080']
