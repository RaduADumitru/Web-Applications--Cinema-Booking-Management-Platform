spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  cloud:
    # Spring Cloud Bus refresh transport. By default the bus binds an anonymous,
    # exclusive, auto-delete queue per instance; that queue trips a binder bug
    # where, after any consumer reset, it can only re-declare the queue
    # passively and loops on 404 NOT_FOUND. Giving the consumer a named group
    # makes the queue non-exclusive and actively declared (no loop). The group
    # is unique per INSTANCE (app name + random id), so every instance still
    # gets its own queue bound to the springCloudBus exchange => busrefresh
    # fans out to all instances of all services. durableSubscription=false makes
    # each queue auto-delete when its instance stops, so per-start ids never leak.
    stream:
      bindings:
        springCloudBusInput:
          group: ${spring.application.name}-${random.uuid}
      rabbit:
        bindings:
          springCloudBusInput:
            consumer:
              durableSubscription: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}

jwt:
  secret:
    key: '{cipher}'

service:
  token:
    # TTL (seconds) for service-to-service JWTs minted per outgoing Feign call.
    ttl-seconds: ${SERVICE_TOKEN_TTL_SECONDS:60}

auth:
  cookie:
    secure: ${SECURITY_COOKIE_SECURE:true}
    same-site: ${SECURITY_COOKIE_SAME_SITE:LAX}

security:
  csrf:
    enabled: ${SECURITY_CSRF_ENABLED:true}
  max-attempts: ${SECURITY_MAX_ATTEMPTS:5}
  website:
    domain: ${SECURITY_WEBSITE_DOMAIN:http://localhost:4200}
  cors:
    allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:4200}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    # Keep the Eureka client OUT of refresh scope. Otherwise a Spring Cloud Bus
    # busrefresh tears down and rebuilds the DiscoveryClient, and the rebuild
    # crashes on this version (spring-cloud-netflix 5.0.2 mis-deserializes a 404
    # heartbeat response -> "Root name ('timestamp')..." -> NPE), 500-ing the
    # service's /actuator/health and the refresh itself. We never refresh Eureka
    # settings live, so disabling refresh scope here is free.
    refresh:
      enable: false
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,busrefresh
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  logback:
    rollingpolicy:
      max-file-size: 10MB
      total-size-cap: 100MB
  threshold:
    file: ERROR
  level:
    com.awbd.cinema: INFO
    com.netflix.discovery: INFO
    org.springframework.cloud.loadbalancer: DEBUG

# Inter-service resilience. One retry + circuitbreaker instance per downstream service,
# named to match the @FeignClient name used in @Retry(name=...) / @CircuitBreaker(name=...).
resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 5s
        # Retry ONLY transient faults. 4xx business errors and an open circuit
        # (CallNotPermittedException) are deliberately excluded.
        retry-exceptions:
          - feign.RetryableException
          - feign.FeignException$FeignServerException
          - java.io.IOException
    instances:
      catalog-service:
        base-config: default
      user-service:
        base-config: default
      booking-service:
        base-config: default
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
        # Benign 4xx mean the downstream is healthy and correctly rejecting a request,
        # so they must not trip the breaker (mirrors the old CircuitBreakerConfiguration).
        ignore-exceptions:
          - feign.FeignException$NotFound
          - feign.FeignException$BadRequest
          - feign.FeignException$Conflict
          - feign.FeignException$UnprocessableEntity
    instances:
      catalog-service:
        base-config: default
      user-service:
        base-config: default
      booking-service:
        base-config: default
