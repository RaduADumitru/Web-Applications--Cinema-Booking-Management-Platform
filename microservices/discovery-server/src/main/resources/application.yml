server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: discovery-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
  server:
    # PoC/dev registry: self-preservation produces a misleading "renewals are
    # lesser than threshold" banner in a tiny cluster. Disable it so dead
    # instances are actually evicted and the dashboard reflects reality.
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 15000

management:
  endpoints:
    web:
      exposure:
        include: health,info
