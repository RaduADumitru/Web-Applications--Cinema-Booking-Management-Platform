        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Offers]
      summary: Delete an offer
      description: '**Authorization:** STAFF.'
      operationId: deleteOffer
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204': { description: Offer deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

components:

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: jwt
      description: >-
        Session JWT issued by `POST /auth/login` as an HttpOnly `jwt` cookie. Required by
        every endpoint except `/auth/**`.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema: { type: integer, format: int64 }
    XsrfToken:
      name: X-XSRF-TOKEN
      in: header
      required: true
      description: >-
        CSRF token; must equal the value of the `XSRF-TOKEN` cookie set at login. Required
        for all state-changing requests except `/auth/**`.
      schema: { type: string }
    PageNumber:
      name: page
      in: query
      required: false
      description: 0-based page index (Spring `Pageable`).
      schema: { type: integer, format: int32, default: 0, minimum: 0 }
    PageSize:
      name: size
      in: query
      required: false
      description: Page size (Spring `Pageable`).
      schema: { type: integer, format: int32, default: 20, minimum: 1 }
    SortParam:
      name: sort
      in: query
      required: false
      description: >-
        Sort criteria in the format `property,(asc|desc)`. May be repeated for multiple
        criteria, e.g. `sort=createdAt,desc`.
      schema:
        type: array
        items: { type: string }
      explode: true

  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication required or invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated but lacking the required role.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Validation failed (per-field messages in `details`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorResponse' }

  schemas:

    # ---------- Enums ----------
    Role:
      type: string
      enum: [OWNER, STAFF, USER]
    GenreType:
      type: string
      enum: [ACTION, ADVENTURE, ANIMATION, COMEDY, CRIME, DOCUMENTARY, DRAMA, FAMILY, FANTASY, HISTORY, HORROR, MUSIC, MYSTERY, ROMANCE, SCI_FI, THRILLER, TV_MOVIE, WAR, WESTERN]
    RoomType:
      type: string
      enum: [IMAX, NORMAL]
    SeatZone:
      type: string
      enum: [VIP, A, B, C, D]
    SeatCategoryType:
      type: string
      enum: [STANDARD, VIP]
    Format:
      type: string
      enum: [TWO_D, THREE_D]
    TicketType:
      type: string
      enum: [ADULT, STUDENT, CHILD]
    OrderStatus:
      type: string
      enum: [PENDING, PAID, CANCELLED]
    NotificationType:
      type: string
      enum: [MOVIE_REMINDER, REGISTERED_FROM_ANOTHER_DEVICE, EMAIL_VERIFICATION, TICKET_BOUGHT, SUCCESSFUL_PAYMENT]
    DayOfWeek:
      type: string
      enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]

    # ---------- Generic ----------
    MessageResponse:
      type: object
      properties:
        message: { type: string }
    ErrorResponse:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        status: { type: integer, format: int32 }
        message: { type: string }
        details:
          type: object
          nullable: true
          additionalProperties: { type: string }
    ValidationErrorResponse:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        status: { type: integer, format: int32, example: 422 }
        message: { type: string, example: 'Validation failed.' }
        details:
          type: object
          description: Map of field name to validation message.
          additionalProperties: { type: string }

    # ---------- Auth ----------
    RegisterDTO:
      type: object
      required: [username, password, confirmPassword, email, firstName, lastName, phoneNumber]
      properties:
        username:
          type: string
          pattern: '^[a-zA-Z0-9._-]{3,20}$'
        password:
          type: string
          minLength: 8
          pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).+$'
          description: At least 8 chars with lower, upper, digit and special character.
        confirmPassword:
          type: string
          minLength: 8
          maxLength: 128
          description: Must match `password`.
        email: { type: string, format: email }
        firstName:
          type: string
          pattern: '^[a-zA-ZăâîșțĂÂÎȘȚ]{2,}(?:[ -][a-zA-ZăâîșțĂÂÎȘȚ]+){0,2}$'
        lastName:
          type: string
          pattern: '^[a-zA-ZăâîșțĂÂÎȘȚ]{2,}(?:[ -][a-zA-ZăâîșțĂÂÎȘȚ]+){0,2}$'
        phoneNumber:
          type: string
          pattern: '^\+?[0-9]{7,15}$'
    RegisterResponseDTO:
      type: object
      properties:
        message: { type: string }
        username: { type: string }
    LoginDTO:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    LoginResponseDTO:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        role: { $ref: '#/components/schemas/Role' }

    # ---------- User ----------
    ProfileDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string }
        phoneNumber: { type: string }
        loyaltyPoints: { type: integer, format: int32 }
        role: { $ref: '#/components/schemas/Role' }
    UpdateProfileDTO:
      type: object
      properties:
        firstName:
          type: string
          pattern: '^[a-zA-ZăâîșțĂÂÎȘȚ]{2,}(?:[ -][a-zA-ZăâîșțĂÂÎȘȚ]+){0,2}$'
        lastName:
          type: string
          pattern: '^[a-zA-ZăâîșțĂÂÎȘȚ]{2,}(?:[ -][a-zA-ZăâîșțĂÂÎȘȚ]+){0,2}$'
        email: { type: string, format: email }
        phoneNumber:
          type: string
          pattern: '^\+?[0-9]{7,15}$'
    PromoteDTO:
      type: object
      required: [id, role]
      properties:
        id: { type: integer, format: int64, minimum: 0 }
        role: { $ref: '#/components/schemas/Role' }

    # ---------- Movies ----------
    AdminMovieDTO:
      type: object
      properties:
        id: { type: integer, format: int32 }
        title: { type: string }
        imageUrl: { type: string }
        releaseDate: { type: string, format: date-time }
        genreIds:
          type: array
          items: { type: integer, format: int32 }
        rating: { type: number, format: double }
        description: { type: string }
    MovieDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        title: { type: string }
        releaseDate: { type: string, format: date-time }
        description: { type: string }
        rating: { type: number, format: double }
        duration: { type: integer, format: int32 }
        ageRating: { type: string }
        genres:
          type: array
          items: { $ref: '#/components/schemas/GenreType' }
        imagePath: { type: string }
    SaveMovieDTO:
      type: object
      properties:
        title: { type: string }
        releaseDate: { type: string, format: date-time }
        description: { type: string }
        rating: { type: number, format: double }
        duration: { type: integer, format: int32 }
        ageRating: { type: string }
        genres:
          type: array
          items: { $ref: '#/components/schemas/GenreType' }
        imagePath: { type: string }

    # ---------- Rooms ----------
    RoomDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { $ref: '#/components/schemas/RoomType' }
        name: { type: string }
        floor: { type: integer, format: int32 }
    SaveRoomDTO:
      type: object
      required: [type, name, floor]
      properties:
        type: { $ref: '#/components/schemas/RoomType' }
        name: { type: string }
        floor: { type: integer, format: int32 }

    # ---------- Seats ----------
    SeatDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        row: { type: integer, format: int32 }
        number: { type: integer, format: int32 }
        zone: { $ref: '#/components/schemas/SeatZone' }
        categoryId: { type: integer, format: int64 }
    SaveSeatDTO:
      type: object
      required: [row, number, zone, roomId]
      properties:
        row: { type: integer, format: int32, minimum: 1 }
        number: { type: integer, format: int32, minimum: 1 }
        zone: { $ref: '#/components/schemas/SeatZone' }
        categoryId: { type: integer, format: int64 }
        roomId: { type: integer, format: int64 }
    GenerateSeatsDTO:
      type: object
      required: [roomId, rows, seatsPerRow, startRow, startSeatNumber, zone]
      properties:
        roomId: { type: integer, format: int64 }
        rows: { type: integer, format: int32, minimum: 1 }
        seatsPerRow: { type: integer, format: int32, minimum: 1 }
        startRow: { type: integer, format: int32, minimum: 1 }
        startSeatNumber: { type: integer, format: int32, minimum: 1 }
        zone: { $ref: '#/components/schemas/SeatZone' }
        categoryId: { type: integer, format: int64 }

    # ---------- Seat Categories ----------
    SeatCategoryDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { $ref: '#/components/schemas/SeatCategoryType' }
        extraFee: { type: number }
        extraPoints: { type: integer, format: int32 }
    UpdateSeatCategoryDTO:
      type: object
      required: [extraFee, extraPoints]
      properties:
        extraFee: { type: number, minimum: 0 }
        extraPoints: { type: integer, format: int32, minimum: 0 }

    # ---------- Screen Sessions ----------
    ScreenSessionDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        date: { type: string, format: date }
        startTime: { type: string, example: '18:30:00' }
        endTime: { type: string, example: '20:45:00' }
        movieId: { type: integer, format: int64 }
        movieTitle: { type: string }
        sessionInfoId: { type: integer, format: int64 }
        format: { $ref: '#/components/schemas/Format' }
        points: { type: integer, format: int32 }
        roomIds:
          type: array
          items: { type: integer, format: int64 }
    SaveScreenSessionDTO:
      type: object
      required: [movieId, date, startTime, endTime, roomId]
      properties:
        movieId: { type: integer, format: int64 }
        date:
          type: string
          format: date
          description: Must be today or in the future.
        startTime: { type: string, example: '18:30:00' }
        endTime: { type: string, example: '20:45:00' }
        sessionInfoId: { type: integer, format: int64 }
        roomId: { type: integer, format: int64 }

    # ---------- Session Infos ----------
    SessionInfoDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        format: { $ref: '#/components/schemas/Format' }
        points: { type: integer, format: int32 }
    SaveSessionInfoDTO:
      type: object
      required: [format, points]
      properties:
        format: { $ref: '#/components/schemas/Format' }
        points: { type: integer, format: int32, minimum: 0 }

    # ---------- Tickets ----------
    TicketDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        isAvailable: { type: boolean }
        seatId: { type: integer, format: int64 }
        roomId: { type: integer, format: int64 }
        screenSessionId: { type: integer, format: int64 }
        type: { $ref: '#/components/schemas/TicketType' }
        price: { type: number }
    SaveTicketDTO:
      type: object
      required: [seatId, roomId, screenSessionId]
      properties:
        seatId: { type: integer, format: int64 }
        roomId: { type: integer, format: int64 }
        screenSessionId: { type: integer, format: int64 }
    BulkSaveTicketsDTO:
      type: object
      required: [seatIds, roomId, screenSessionId]
      properties:
        seatIds:
          type: array
          minItems: 1
          items: { type: integer, format: int64 }
        roomId: { type: integer, format: int64 }
        screenSessionId: { type: integer, format: int64 }
    BookTicketDTO:
      type: object
      required: [type]
      properties:
        type: { $ref: '#/components/schemas/TicketType' }

    # ---------- Ticket Info ----------
    TicketInfoDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { $ref: '#/components/schemas/TicketType' }
        price: { type: number }
    SaveTicketInfoDTO:
      type: object
      required: [type, price]
      properties:
        type: { $ref: '#/components/schemas/TicketType' }
        price: { type: number, minimum: 0 }

    # ---------- Orders ----------
    OrderItemDTO:
      type: object
      required: [ticketId, type]
      properties:
        ticketId: { type: integer, format: int64 }
        type: { $ref: '#/components/schemas/TicketType' }
    CreateOrderDTO:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/OrderItemDTO' }
        useDiscount: { type: boolean }
    OrderDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        createdAt: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/OrderStatus' }
        paymentAt: { type: string, format: date-time, nullable: true }
        deletedAt: { type: string, format: date-time, nullable: true }
        price: { type: number }
        loyaltyPoints: { type: integer, format: int32 }
        pointsUsed: { type: integer, format: int32 }
        discount: { type: number }
        userId: { type: integer, format: int64 }
        ticketIds:
          type: array
          items: { type: integer, format: int64 }
        offerPercent: { type: integer, format: int32, nullable: true }
        offerMessage: { type: string, nullable: true }
    DiscountPreviewDTO:
      type: object
      properties:
        loyaltyPoints: { type: integer, format: int32 }
        potentialDiscount: { type: number }

    # ---------- Notifications ----------
    NotificationDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        type: { $ref: '#/components/schemas/NotificationType' }
        content: { type: string }
        createdDate: { type: string, format: date-time }
        sentDate: { type: string, format: date-time, nullable: true }
        userId: { type: integer, format: int64 }
        order:
          allOf: [ { $ref: '#/components/schemas/OrderDTO' } ]
          nullable: true
    CreateNotificationDTO:
      type: object
      required: [type, content, userId]
      properties:
        type: { $ref: '#/components/schemas/NotificationType' }
        content: { type: string }
        userId: { type: integer, format: int64 }

    # ---------- Offers ----------
    OfferDTO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        day: { $ref: '#/components/schemas/DayOfWeek' }
        percent: { type: integer, format: int32 }
    SaveOfferDTO:
      type: object
      required: [day, percent]
      properties:
        day: { $ref: '#/components/schemas/DayOfWeek' }
        percent: { type: integer, format: int32, minimum: 1, maximum: 100 }

    # ---------- Pagination ----------
    PageMeta:
      type: object
      description: Spring "page" metadata accompanying the `content` array.
      properties:
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer, format: int32 }
        number: { type: integer, format: int32, description: 0-based index of the current page. }
        size: { type: integer, format: int32 }
        numberOfElements: { type: integer, format: int32 }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }
        sort:
          type: object
          properties:
            sorted: { type: boolean }
            unsorted: { type: boolean }
            empty: { type: boolean }
        pageable:
          type: object
          description: Echo of the resolved paging request.
    PageProfileDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/ProfileDTO' }
    PageAdminMovieDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/AdminMovieDTO' }
    PageMovieDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/MovieDTO' }
    PageRoomDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/RoomDTO' }
    PageSeatDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/SeatDTO' }
    PageScreenSessionDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/ScreenSessionDTO' }
    PageSessionInfoDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/SessionInfoDTO' }
    PageTicketDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/TicketDTO' }
    PageTicketInfoDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/TicketInfoDTO' }
    PageOrderDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/OrderDTO' }
    PageNotificationDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/NotificationDTO' }
    PageOfferDTO:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items: { $ref: '#/components/schemas/OfferDTO' }
