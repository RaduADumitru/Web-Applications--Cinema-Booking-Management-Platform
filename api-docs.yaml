openapi: 3.0.3
info:
  title: Cinema Booking & Management Platform API
  version: "1.0.0"
  description: >-
    Public REST API of the Cinema Booking & Management Platform.


    This single specification is **identical for both deployments**: the monolith
    (`cinema`, exposed on `http://localhost:8081/api/v1`) and the microservices stack
    behind the Spring Cloud Gateway (`http://localhost:8080/api/v1`). The microservices
    split these controllers across `user-service`, `catalog-service` and
    `booking-service`, but the externally exposed contract is the same. Service-to-service
    `/internal/**` endpoints are intentionally **not** part of this document — they are not
    reachable by end users.


    ## Authentication

    Authentication is JWT-based over an HttpOnly `jwt` cookie obtained from
    `POST /auth/login`. Every endpoint requires this cookie **except** the `/auth/**`
    endpoints, which are public. A `refresh` cookie issued alongside it renews the session
    via `POST /auth/refresh`.


    ## Authorization (roles)

    Roles form a hierarchy: `OWNER > STAFF > USER`. An operation requiring `STAFF` is also
    permitted to `OWNER`; one requiring `USER` is permitted to any authenticated user. Each
    operation states its requirement under **Authorization** in its description. A missing or
    invalid session yields `401`; an authenticated user lacking the required role yields `403`.


    ## CSRF

    CSRF protection is enabled. Login sets a readable `XSRF-TOKEN` cookie; every
    state-changing request (`POST`, `PUT`, `PATCH`, `DELETE`) **except** `/auth/**` must echo
    that value in the `X-XSRF-TOKEN` header. These operations declare the header explicitly.


    ## Pagination & sorting

    List endpoints return a Spring "page" object. Most accept the standard `Pageable`
    parameters (`page` 0-based, `size`, `sort`); a few legacy endpoints
    (`GET /movies`, `GET /movies/admin/list`, `GET /user/all`) use 1-based `page`/`size`
    query parameters instead, as documented per operation.

servers:
  - url: http://localhost:8080/api/v1
    description: Application backend (either monolith or microservices gateway)

tags:
  - name: Auth
    description: Registration, login, token refresh and logout.
  - name: User
    description: Current-user profile and user administration.
  - name: Movies
    description: Movie catalog (public browsing + STAFF management, TMDB import).
  - name: Rooms
    description: Cinema rooms and their seat / screen-session associations.
  - name: Seats
    description: Seats and bulk seat generation.
  - name: Seat Categories
    description: Seat category surcharges (extra fee / points).
  - name: Screen Sessions
    description: Movie screenings scheduled in rooms.
  - name: Session Infos
    description: Reusable screening attributes (format, points).
  - name: Tickets
    description: Per-seat tickets for screenings and seat booking.
  - name: Ticket Info
    description: Ticket pricing by ticket type.
  - name: Orders
    description: Purchase orders, payment, cancellation and loyalty discounts.
  - name: Notifications
    description: User notifications.
  - name: Offers
    description: Day-of-week percentage discounts.

security:
  - cookieAuth: []

paths:

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      description: |
        Creates a new user account with the default `USER` role.
        **Authorization:** public.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterDTO' }
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegisterResponseDTO' }
        '409':
          description: Username or email already in use.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates the user and sets the `jwt`, `refresh` and `XSRF-TOKEN` cookies.
        **Authorization:** public.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginDTO' }
      responses:
        '200':
          description: Authenticated. Auth cookies are set via `Set-Cookie`.
          headers:
            Set-Cookie:
              description: Sets the `jwt` and `refresh` cookies (and `XSRF-TOKEN`).
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponseDTO' }
        '401':
          description: Invalid credentials, locked account, or unverified email.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh the session
      description: |
        Issues new `jwt` / `refresh` cookies from a valid `refresh` cookie.
        **Authorization:** public (requires the `refresh` cookie).
      operationId: refresh
      security: []
      parameters:
        - name: refresh
          in: cookie
          required: true
          description: The refresh-token cookie issued at login.
          schema: { type: string }
      responses:
        '200':
          description: Tokens refreshed; new auth cookies are set.
          headers:
            Set-Cookie:
              description: Sets new `jwt` and `refresh` cookies.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401':
          description: Missing or invalid refresh token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: |
        Clears the `jwt` and `refresh` cookies.
        **Authorization:** public.
      operationId: logout
      security: []
      responses:
        '200':
          description: Logged out; auth cookies are cleared.
          headers:
            Set-Cookie:
              description: Expires the `jwt` and `refresh` cookies.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /user:
    get:
      tags: [User]
      summary: Get current user's profile
      description: '**Authorization:** any authenticated user.'
      operationId: getCurrentUser
      responses:
        '200':
          description: The authenticated user's profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [User]
      summary: Delete current user's account
      description: '**Authorization:** any authenticated user (deletes own account).'
      operationId: deleteCurrentUser
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
      responses:
        '200':
          description: Account deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [User]
      summary: Update current user's profile
      description: '**Authorization:** any authenticated user.'
      operationId: updateProfile
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileDTO' }
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /user/{id}:
    delete:
      tags: [User]
      summary: Delete a user by id
      description: '**Authorization:** OWNER.'
      operationId: deleteUserById
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - name: id
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: User deleted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /user/promote:
    patch:
      tags: [User]
      summary: Promote/demote a user's role
      description: '**Authorization:** OWNER. A user cannot promote themselves (`400`).'
      operationId: promoteUser
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromoteDTO' }
      responses:
        '200':
          description: Updated profile with the new role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileDTO' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /user/all:
    get:
      tags: [User]
      summary: List all users
      description: '**Authorization:** OWNER. Uses 1-based `page`/`size` query parameters.'
      operationId: getAllUsers
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: 1-based page index.
        - name: size
          in: query
          schema: { type: integer, default: 10 }
      responses:
        '200':
          description: Page of user profiles.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageProfileDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /movies/admin/list:
    get:
      tags: [Movies]
      summary: List movies (admin view)
      description: '**Authorization:** STAFF. Uses a 1-based `page` query parameter (fixed size).'
      operationId: getAdminMovieList
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: 1-based page index.
      responses:
        '200':
          description: Page of admin movie entries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageAdminMovieDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /movies/admin/save/{tmdbId}:
    post:
      tags: [Movies]
      summary: Import a movie from TMDB
      description: '**Authorization:** STAFF. Imports/saves the TMDB movie with the given id.'
      operationId: saveMovie
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - name: tmdbId
          in: path
          required: true
          description: TMDB movie id.
          schema: { type: integer, format: int32 }
      responses:
        '200':
          description: The saved movie.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SaveMovieDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /movies:
    get:
      tags: [Movies]
      summary: List movies (public catalog) with filters
      description: '**Authorization:** any authenticated user. Uses 1-based `page`/`size`.'
      operationId: getMovies
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
          description: 1-based page index.
        - name: size
          in: query
          schema: { type: integer, default: 10 }
        - name: title
          in: query
          schema: { type: string }
        - name: minRating
          in: query
          schema: { type: number, format: double }
        - name: maxRating
          in: query
          schema: { type: number, format: double }
        - name: ageRating
          in: query
          schema: { type: string }
        - name: releaseFrom
          in: query
          description: ISO date lower bound (inclusive).
          schema: { type: string }
        - name: releaseTo
          in: query
          description: ISO date upper bound (inclusive).
          schema: { type: string }
        - name: genre
          in: query
          description: Genre name; one of the GenreType values.
          schema: { type: string }
      responses:
        '200':
          description: Page of movies.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageMovieDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /movies/{id}:
    get:
      tags: [Movies]
      summary: Get a movie by id
      description: '**Authorization:** any authenticated user.'
      operationId: getMovie
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: The movie.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MovieDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Movies]
      summary: Update a movie
      description: '**Authorization:** STAFF.'
      operationId: updateMovie
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveMovieDTO' }
      responses:
        '200':
          description: The updated movie.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MovieDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Movies]
      summary: Delete a movie
      description: '**Authorization:** STAFF.'
      operationId: deleteMovie
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204': { description: Movie deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /rooms:
    post:
      tags: [Rooms]
      summary: Create a room
      description: '**Authorization:** STAFF.'
      operationId: createRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveRoomDTO' }
      responses:
        '201':
          description: Created room.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoomDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [Rooms]
      summary: List rooms
      description: '**Authorization:** any authenticated user.'
      operationId: getRooms
      parameters:
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Page of rooms.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageRoomDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /rooms/{id}:
    get:
      tags: [Rooms]
      summary: Get a room by id
      description: '**Authorization:** any authenticated user.'
      operationId: getRoom
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: The room.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoomDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Rooms]
      summary: Update a room
      description: '**Authorization:** STAFF.'
      operationId: updateRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveRoomDTO' }
      responses:
        '200':
          description: The updated room.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoomDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Rooms]
      summary: Delete a room
      description: '**Authorization:** STAFF.'
      operationId: deleteRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204': { description: Room deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /rooms/{roomId}/seats/{seatId}:
    post:
      tags: [Rooms]
      summary: Attach a seat to a room
      description: '**Authorization:** STAFF.'
      operationId: addSeatToRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - { name: roomId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: seatId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: The room with the seat attached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoomDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Rooms]
      summary: Detach a seat from a room
      description: '**Authorization:** STAFF.'
      operationId: removeSeatFromRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - { name: roomId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: seatId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '204': { description: Seat detached. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /rooms/{roomId}/screen-sessions/{sessionId}:
    post:
      tags: [Rooms]
      summary: Attach a screen session to a room
      description: '**Authorization:** STAFF.'
      operationId: addScreenSessionToRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - { name: roomId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: sessionId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '200':
          description: The room with the screen session attached.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoomDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Rooms]
      summary: Detach a screen session from a room
      description: '**Authorization:** STAFF.'
      operationId: removeScreenSessionFromRoom
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - { name: roomId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: sessionId, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        '204': { description: Screen session detached. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /seats:
    post:
      tags: [Seats]
      summary: Create a seat
      description: '**Authorization:** STAFF.'
      operationId: createSeat
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveSeatDTO' }
      responses:
        '201':
          description: Created seat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeatDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    get:
      tags: [Seats]
      summary: List seats with filters
      description: '**Authorization:** any authenticated user.'
      operationId: getSeats
      parameters:
        - { name: roomType, in: query, schema: { type: string }, description: 'Room type filter (IMAX or NORMAL).' }
        - { name: screenSessionId, in: query, schema: { type: integer, format: int64 } }
        - { name: movieId, in: query, schema: { type: integer, format: int64 } }
        - $ref: '#/components/parameters/PageNumber'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Page of seats.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageSeatDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /seats/generate:
    post:
      tags: [Seats]
      summary: Bulk-generate seats for a room
      description: '**Authorization:** STAFF.'
      operationId: generateSeats
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateSeatsDTO' }
      responses:
        '201':
          description: The generated seats.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SeatDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /seats/{id}:
    get:
      tags: [Seats]
      summary: Get a seat by id
      description: '**Authorization:** any authenticated user.'
      operationId: getSeat
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: The seat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeatDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Seats]
      summary: Update a seat
      description: '**Authorization:** STAFF.'
      operationId: updateSeat
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveSeatDTO' }
      responses:
        '200':
          description: The updated seat.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SeatDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Seats]
      summary: Delete a seat
      description: '**Authorization:** STAFF.'
      operationId: deleteSeat
      parameters:
        - $ref: '#/components/parameters/XsrfToken'
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204': { description: Seat deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /seat-categories:
    get:
      tags: [Seat Categories]
      summary: List seat categories
      description: '**Authorization:** any authenticated user.'
      operationId: getSeatCategories
      responses:
        '200':
          description: All seat categories.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SeatCategoryDTO' }
        '401': { $ref: '#/components/responses/Unauthorized' }

