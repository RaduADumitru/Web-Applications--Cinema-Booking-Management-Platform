name: cinema-microservices

x-ms-common: &ms-common
  build:
    context: ./microservices
    dockerfile: Dockerfile
  working_dir: /workspace
  env_file:
    - .env
  networks:
    - microservices-network

services:
  user-db:
    image: postgres:15
    container_name: ms-user-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${USER_DB_NAME}
    volumes:
      - user_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices-network

  catalog-db:
    image: postgres:15
    container_name: ms-catalog-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${CATALOG_DB_NAME}
    volumes:
      - catalog_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices-network

  booking-db:
    image: postgres:15
    container_name: ms-booking-db
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${BOOKING_DB_NAME}
    volumes:
      - booking_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - microservices-network

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    networks:
      - microservices-network

  config-server:
    <<: *ms-common
    container_name: ms-config-server
    command: sh -c "mvn -o -pl config-server spring-boot:run"
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      CONFIG_SEARCH_LOCATIONS: file:/config
    volumes:
      - ./microservices/config-server/config-repo:/config:ro
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    networks:
      - microservices-network

  zipkin:
    image: openzipkin/zipkin:3
    container_name: ms-zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ms-rabbitmq
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
    networks:
      - microservices-network

  discovery-server:
    <<: *ms-common
    container_name: ms-discovery-server
    command: sh -c "mvn -o -pl discovery-server spring-boot:run"
    environment:
      SERVER_PORT: 8761
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    networks:
      - microservices-network

  user-service:
    <<: *ms-common
    command: sh -c "mvn -o -pl user-service spring-boot:run"
    deploy:
      replicas: 1
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://user-db:5432/${USER_DB_NAME}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:4200
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      user-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s
    networks:
      - microservices-network

  catalog-service:
    <<: *ms-common
    command: sh -c "mvn -o -pl catalog-service spring-boot:run"
    deploy:
      replicas: 1
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://catalog-db:5432/${CATALOG_DB_NAME}
      REDIS_HOST: redis
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:4200
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      catalog-db:
        condition: service_healthy
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s
    networks:
      - microservices-network

  booking-service:
    <<: *ms-common
    command: sh -c "mvn -o -pl booking-service spring-boot:run"
    deploy:
      replicas: 1
    environment:
      SERVER_PORT: 8080
      DATABASE_URL: jdbc:postgresql://booking-db:5432/${BOOKING_DB_NAME}
      REDIS_HOST: redis
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      SECURITY_CORS_ALLOWED_ORIGINS: http://localhost:4200
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      booking-db:
        condition: service_healthy
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 180s
    networks:
      - microservices-network

  gateway:
    <<: *ms-common
    container_name: ms-gateway
    command: sh -c "mvn -o -pl gateway spring-boot:run"
    environment:
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka/
      REDIS_HOST: redis
      CONFIG_SERVER_URL: http://config-server:8888
      SPRING_RABBITMQ_HOST: rabbitmq
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      booking-service:
        condition: service_healthy
      redis:
        condition: service_started
      discovery-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - microservices-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: ms-client
    environment:
      API_URL: http://localhost:8080/api/v1
    ports:
      - "4200:4200"
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.angular
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - microservices-network

networks:
  microservices-network:
    driver: bridge

volumes:
  user_db_data:
  catalog_db_data:
  booking_db_data:
